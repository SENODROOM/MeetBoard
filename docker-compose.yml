services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rtc_app
      POSTGRES_USER: rtc_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecurePassword123!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - rtc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtc_user -d rtc_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-SecurePassword123!}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - rtc_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-SecurePassword123!}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - rtc_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-SecurePassword123!}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - rtc_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://rtc_user:${POSTGRES_PASSWORD:-SecurePassword123!}@postgres:5432/rtc_app
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:-SecurePassword123!}@mongodb:27017/rtc_app?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-SecurePassword123!}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-this_is_a_very_long_jwt_secret_key_for_access_tokens_min_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-this_is_a_very_long_jwt_refresh_secret_key_for_refresh_tokens}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-SecurePassword123!}
      S3_BUCKET: rtc-files
      S3_REGION: us-east-1
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - rtc_network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - rtc_network
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:

networks:
  rtc_network:
    driver: bridge
